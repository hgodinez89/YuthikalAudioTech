<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; }
  *, *::before, *::after { box-sizing: border-box; }
  @keyframes yk-eq {
    0%, 100% { transform: scaleY(0.28); opacity: 0.55; }
    50%      { transform: scaleY(1); opacity: 1; }
  }
  @keyframes yk-fade-up {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</helmet>
<div style="{{ pageStyle }}">
  <div style="display: flex; flex-direction: column; align-items: center; gap: 34px; animation: yk-fade-up .5s ease both;">
    <div style="height: 70px; display: flex; align-items: center;">{{ logoImg }}</div>

    <!-- animated waveform -->
    <div style="display: flex; align-items: center; justify-content: center; gap: 4px; height: 84px;">{{ bars }}</div>

    <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
      <span style="font-size: 12px; font-weight: 700; letter-spacing: 0.24em; text-transform: uppercase; color: {{ accentColor }};">{{ eyebrow }}</span>
      <span style="font-size: 14.5px; color: {{ subColor }};">{{ message }}</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1000, &quot;height&quot;: 720}, &quot;theme&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;dark&quot;, &quot;light&quot;], &quot;default&quot;: &quot;dark&quot;, &quot;tsType&quot;: &quot;'dark' | 'light'&quot;}, &quot;eyebrow&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Yuthikal AudioTech&quot;, &quot;tsType&quot;: &quot;string&quot;}, &quot;message&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Afinando tu sesión…&quot;, &quot;tsType&quot;: &quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const S = React.createElement;
    const theme = this.props.theme ?? "dark";
    const light = theme === "light";

    const bg = light ? "#EDF1F7" : "#05070A";
    const grad = light ? "linear-gradient(180deg, #2560D6, #0FA5BE)" : "linear-gradient(180deg, #35D6E8, #2E6BF0)";
    const accentColor = light ? "#0C93AD" : "#35D6E8";
    const subColor = light ? "#64748B" : "#9AA3B2";
    const logoSrc = light ? "assets/yuthikal-logo-claro.png" : "assets/yuthikal-logo-crop.png";
    const logoImg = S("img", { src: logoSrc, alt: "Yuthikal AudioTech", style: { height: "70px", width: "auto", display: "block" } });

    // waveform envelope: taller in the middle, like the brand mark
    const N = 44;
    const bars = S(React.Fragment, null, Array.from({ length: N }, (_, i) => {
      const t = i / (N - 1);                    // 0..1
      const env = Math.sin(t * Math.PI);        // 0 at ends, 1 center
      const jitter = 0.72 + 0.28 * Math.abs(Math.sin(i * 1.7));
      const h = Math.max(6, Math.round((10 + env * 62) * jitter));
      // travelling pulse: delay grows from centre outward for a symmetric breathing wave
      const distFromCenter = Math.abs(t - 0.5) * 2; // 0 centre .. 1 edge
      const delay = (distFromCenter * 0.5).toFixed(2);
      return S("span", { key: i, style: {
        display: "block", width: "5px", height: h + "px", borderRadius: "3px",
        background: grad, transformOrigin: "center",
        animation: "yk-eq 1.1s ease-in-out infinite",
        animationDelay: delay + "s",
      } });
    }));

    return {
      pageStyle: {
        fontFamily: "'Inter', system-ui, sans-serif",
        background: bg,
        minHeight: "100vh",
        height: "100vh",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        padding: "40px 24px",
        WebkitFontSmoothing: "antialiased",
      },
      logoImg,
      bars,
      accentColor,
      subColor,
      eyebrow: this.props.eyebrow ?? "Yuthikal AudioTech",
      message: this.props.message ?? "Afinando tu sesión…",
    };
  }
}
</script>
</body>
</html>
