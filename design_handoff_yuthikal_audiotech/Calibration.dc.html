<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; background: #05070A; }
  *, *::before, *::after { box-sizing: border-box; }
  ::selection { background: rgba(53,214,232,0.28); }
  .yk-scroll::-webkit-scrollbar { width: 10px; }
  .yk-scroll::-webkit-scrollbar-thumb { background: #1c2230; border-radius: 8px; border: 2px solid #05070A; }
  kbd { font-family: inherit; }
</style>
</helmet>
<div style="font-family: 'Inter', system-ui, sans-serif; background: #05070A; color: #E7ECF3; min-height: 100vh; -webkit-font-smoothing: antialiased;">

  <!-- HEADER -->
  <header style="position: sticky; top: 0; z-index: 30; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px 28px; background: rgba(5,7,10,0.82); backdrop-filter: blur(14px); border-bottom: 1px solid #12151C;">
    <div style="display: flex; align-items: center; gap: 16px; min-width: 0;">
      <img src="assets/yuthikal-logo-crop.png" alt="Yuthikal AudioTech" style="height: 38px; width: auto; display: block;">
      <a href="Playlist Detail.dc.html" style="display: flex; align-items: center; gap: 8px; font-size: 13px; color: #7d8798; text-decoration: none; white-space: nowrap;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
        St. James Infirmary Blues
      </a>
    </div>
    <div style="display: flex; padding: 4px; background: #0C0F15; border: 1px solid #1b2130; border-radius: 12px; font-size: 13.5px; font-weight: 600;">
      <a href="Song View.dc.html" style="padding: 8px 16px; border-radius: 9px; color: #9AA3B2; text-decoration: none;">Ver</a>
      <a href="Song Editor.dc.html" style="padding: 8px 16px; border-radius: 9px; color: #9AA3B2; text-decoration: none;">Editar</a>
      <span style="padding: 8px 16px; border-radius: 9px; background: linear-gradient(135deg, #2E6BF0, #35D6E8); color: #04121a;">Calibrar</span>
      <a href="Karaoke.dc.html" style="padding: 8px 16px; border-radius: 9px; color: #9AA3B2; text-decoration: none;">Karaoke</a>
    </div>
  </header>

  <div style="max-width: 1180px; margin: 0 auto; padding: 28px 28px 200px; display: grid; grid-template-columns: 340px 1fr; gap: 24px; align-items: start;">

    <!-- LEFT: source + settings -->
    <aside style="display: flex; flex-direction: column; gap: 18px; position: sticky; top: 90px;">
      <!-- audio source -->
      <div style="background: #12151C; border: 1px solid #1b2130; border-radius: 16px; overflow: hidden;">
        <div style="padding: 14px 16px; border-bottom: 1px solid #1b2130;">
          <span style="font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #7d8798;">Fuente de audio</span>
        </div>
        <div style="padding: 14px 16px;">
          <div style="display: flex; padding: 4px; background: #0C0F15; border: 1px solid #1b2130; border-radius: 10px; font-size: 13px; font-weight: 600; margin-bottom: 14px;">
            <button onClick="{{ setYt }}" style="{{ ytTabStyle }}">YouTube</button>
            <button onClick="{{ setFile }}" style="{{ fileTabStyle }}">Archivo</button>
          </div>

          <sc-if value="{{ isYt }}" hint-placeholder-val="{{ true }}">
            <div>
              <div style="position: relative; display: flex; align-items: center; margin-bottom: 12px;">
                <svg style="position: absolute; left: 12px;" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#5b6577" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.7 1.7"></path><path d="M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7l1.7-1.7"></path></svg>
                <input value="https://youtu.be/pWLybm_KEZM" style="width: 100%; height: 40px; padding: 0 12px 0 36px; background: #0F131B; border: 1px solid #1f2636; border-radius: 10px; color: #E7ECF3; font-size: 13px; font-family: inherit; outline: none;" style-focus="border-color: #35D6E8;">
              </div>
              <!-- connected video card -->
              <div style="display: flex; gap: 12px; padding: 10px; background: #0F131B; border: 1px solid #2a3346; border-radius: 12px;">
                <div style="position: relative; flex: 0 0 96px; height: 56px; border-radius: 8px; overflow: hidden; background: linear-gradient(135deg, #1a2233, #0c1420);">
                  <div style="position: absolute; inset: 0; display: flex; align-items: flex-end; gap: 2px; padding: 8px;">{{ thumbWave }}</div>
                  <div style="position: absolute; inset: 0; display: grid; place-items: center;"><span style="display: grid; place-items: center; width: 26px; height: 26px; border-radius: 50%; background: rgba(5,7,10,0.7);"><svg width="12" height="12" viewBox="0 0 24 24" fill="#fff" style="margin-left:1px;"><path d="M8 5v14l11-7z"></path></svg></span></div>
                </div>
                <div style="min-width: 0; display: flex; flex-direction: column; justify-content: center;">
                  <div style="display: flex; align-items: center; gap: 6px; font-size: 10.5px; font-weight: 700; color: #35D6E8; margin-bottom: 3px;">
                    <span style="width: 6px; height: 6px; border-radius: 50%; background: #35D6E8;"></span>CONECTADO
                  </div>
                  <div style="font-size: 13px; font-weight: 600; line-height: 1.25; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">St. James Infirmary — Live Session</div>
                  <div style="font-size: 11.5px; color: #7d8798; margin-top: 2px;">3:48</div>
                </div>
              </div>
            </div>
          </sc-if>

          <sc-if value="{{ isFile }}" hint-placeholder-val="{{ false }}">
            <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 28px 16px; background: #0F131B; border: 1.5px dashed #2a3346; border-radius: 12px; text-align: center; cursor: pointer;">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#35D6E8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M17 8l-5-5-5 5"></path><path d="M12 3v12"></path></svg>
              <div style="font-size: 13.5px; font-weight: 600; color: #C3CAD6;">Arrastra tu MP3 aquí</div>
              <div style="font-size: 12px; color: #7d8798;">o haz clic para elegir un archivo</div>
            </div>
          </sc-if>
        </div>
      </div>

      <!-- granularity -->
      <div style="background: #12151C; border: 1px solid #1b2130; border-radius: 16px; overflow: hidden;">
        <div style="padding: 14px 16px; border-bottom: 1px solid #1b2130;">
          <span style="font-size: 12px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #7d8798;">Granularidad</span>
        </div>
        <div style="padding: 14px 16px; display: flex; flex-direction: column; gap: 10px;">
          <sc-for list="{{ granOptions }}" as="g" hint-placeholder-count="2">
            <button onClick="{{ g.select }}" style="{{ g.cardStyle }}">
              <span style="{{ g.radioStyle }}">{{ g.radioDot }}</span>
              <span style="text-align: left;">
                <span style="display: block; font-size: 13.5px; font-weight: 700; color: #E7ECF3;">{{ g.title }}</span>
                <span style="display: block; font-size: 12px; color: #8b93a3; margin-top: 2px;">{{ g.sub }}</span>
              </span>
            </button>
          </sc-for>
        </div>
      </div>
    </aside>

    <!-- RIGHT: calibration sheet -->
    <main>
      <!-- instruction banner / tap zone -->
      <button onClick="{{ markLine }}" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 14px; padding: 22px; margin-bottom: 18px; background: linear-gradient(135deg, rgba(46,107,240,0.16), rgba(53,214,232,0.16)); border: 1.5px solid rgba(53,214,232,0.4); border-radius: 16px; cursor: pointer; font-family: inherit;" style-hover="border-color: #35D6E8; background: linear-gradient(135deg, rgba(46,107,240,0.24), rgba(53,214,232,0.24));">
        <span style="display: grid; place-items: center; width: 42px; height: 42px; border-radius: 12px; background: rgba(5,7,10,0.4); color: #35D6E8; flex: 0 0 auto;">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
        </span>
        <span style="text-align: left;">
          <span style="display: block; font-size: 16px; font-weight: 700; color: #E7ECF3;">Presiona <kbd style="padding: 2px 9px; background: #0b0d12; border: 1px solid #2a3346; border-radius: 6px; font-size: 13px; font-weight: 700; color: #35D6E8;">ESPACIO</kbd> o toca aquí cuando empiece esta línea</span>
          <span style="display: block; font-size: 12.5px; color: #9fb6c0; margin-top: 3px;">Marcando línea {{ markNum }} de {{ totalLines }} · granularidad por línea</span>
        </span>
      </button>

      <!-- sheet -->
      <div class="yk-scroll" style="background: #12151C; border: 1px solid #1b2130; border-radius: 16px; padding: 10px 8px;">
        <sc-for list="{{ lines }}" as="ln" hint-placeholder-count="8">
          <div style="{{ ln.rowStyle }}">
            <div style="flex: 0 0 74px; display: flex; align-items: center; gap: 7px;">{{ ln.statusEl }}</div>
            <div style="flex: 1; min-width: 0;">
              <sc-if value="{{ ln.isSection }}" hint-placeholder-val="{{ false }}">
                <span style="font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #9AA3B2;">{{ ln.text }}</span>
              </sc-if>
              <sc-if value="{{ ln.isLyric }}" hint-placeholder-val="{{ true }}">
                <span style="{{ ln.textStyle }}">{{ ln.text }}</span>
              </sc-if>
            </div>
            <sc-if value="{{ ln.done }}" hint-placeholder-val="{{ false }}">
              <button onClick="{{ ln.remark }}" title="Volver a marcar esta línea" style="flex: 0 0 auto; display: grid; place-items: center; width: 32px; height: 32px; background: transparent; border: none; border-radius: 8px; color: #5b6577; cursor: pointer;" style-hover="background: #1b2130; color: #35D6E8;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v6h6"></path><path d="M3 8a9 9 0 1 0 2.5-5.7L3 8"></path></svg>
              </button>
            </sc-if>
          </div>
        </sc-for>
      </div>
    </main>
  </div>

  <!-- TRANSPORT BAR -->
  <div style="position: fixed; bottom: 0; left: 0; right: 0; z-index: 40; background: rgba(9,12,18,0.94); backdrop-filter: blur(14px); border-top: 1px solid #1b2130;">
    <div style="max-width: 1180px; margin: 0 auto; padding: 14px 28px; display: flex; align-items: center; gap: 18px;">
      <button onClick="{{ togglePlay }}" style="display: grid; place-items: center; width: 46px; height: 46px; flex: 0 0 auto; border-radius: 50%; background: linear-gradient(135deg, #2E6BF0, #35D6E8); border: none; color: #04121a; cursor: pointer; box-shadow: 0 4px 18px rgba(46,107,240,0.35);">{{ playIcon }}</button>
      <span style="font-size: 12.5px; font-variant-numeric: tabular-nums; color: #9AA3B2; flex: 0 0 auto;">{{ elapsed }}</span>
      <div onClick="{{ seek }}" style="flex: 1; display: flex; align-items: center; gap: 2.5px; height: 34px; cursor: pointer;">{{ progressWave }}</div>
      <span style="font-size: 12.5px; font-variant-numeric: tabular-nums; color: #7d8798; flex: 0 0 auto;">3:48</span>
      <button onClick="{{ reset }}" style="display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; flex: 0 0 auto; background: #0F131B; border: 1px solid #2a3346; border-radius: 11px; color: #C3CAD6; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v6h6"></path><path d="M3 8a9 9 0 1 0 2.5-5.7L3 8"></path></svg>
        Reiniciar calibración
      </button>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1180, &quot;height&quot;: 880}}">
class Component extends DCLogic {
  state = {
    source: "youtube",
    gran: "line",
    playing: true,
    current: 3,        // index into LINES of the active target
    stamps: {},        // lineIndex -> "m:ss.d"
    progress: 0.32,
  };

  LINES = [
    { type: "section", text: "Verso 1" },
    { type: "lyric", text: "I went down to the St. James Infirmary" },
    { type: "lyric", text: "Saw my baby lyin' there" },
    { type: "lyric", text: "So sweet, so cold, so fair" },
    { type: "section", text: "Coro" },
    { type: "lyric", text: "Let her go, let her go, God bless her" },
    { type: "lyric", text: "Wherever she may be" },
    { type: "lyric", text: "She can look this wide world over" },
    { type: "lyric", text: "But she'll never find a sweeter man than me" },
  ];

  // preset captured timestamps for already-marked lines
  PRESET = { 1: "0:12.4", 2: "0:19.8" };

  componentDidMount() {
    this._key = (e) => { if (e.code === "Space") { e.preventDefault(); this.markLine(); } };
    window.addEventListener("keydown", this._key);
    // seed presets
    this.setState({ stamps: { ...this.PRESET } });
  }
  componentWillUnmount() { window.removeEventListener("keydown", this._key); }

  lyricIndices() { return this.LINES.map((l, i) => l.type === "lyric" ? i : -1).filter(i => i >= 0); }

  markLine() {
    const idx = this.state.current;
    if (this.LINES[idx] && this.LINES[idx].type === "section") return;
    const t = (12 + Object.keys(this.state.stamps).length * 7.6);
    const mm = Math.floor(t / 60), ss = (t % 60).toFixed(1).padStart(4, "0");
    const stamp = mm + ":" + ss;
    const stamps = { ...this.state.stamps, [idx]: stamp };
    // advance to next lyric line
    let next = idx + 1;
    while (next < this.LINES.length && this.LINES[next].type === "section") next++;
    this.setState({ stamps, current: Math.min(next, this.LINES.length - 1), progress: Math.min(0.95, this.state.progress + 0.08) });
  }

  waveBars(count, filledFrac, palette) {
    const S = React.createElement;
    const filled = Math.round(count * filledFrac);
    return S(React.Fragment, null, Array.from({ length: count }, (_, i) => {
      const h = 6 + Math.abs(Math.sin(i * 0.5)) * 20 + (i % 3) * 2;
      const on = i <= filled;
      return S("span", { key: i, style: {
        flex: 1, minWidth: "2px", height: Math.round(h) + "px", borderRadius: "2px",
        background: on ? "linear-gradient(180deg, #35D6E8, #2E6BF0)" : (palette === "dark" ? "#243042" : "#1b2130"),
      } });
    }));
  }

  thumbWaveEls() {
    const S = React.createElement;
    return S(React.Fragment, null, Array.from({ length: 16 }, (_, i) => {
      const h = 6 + Math.abs(Math.sin(i * 0.7)) * 26;
      return S("span", { key: i, style: { flex: 1, height: h + "%", borderRadius: "1px", background: "rgba(53,214,232,0.5)" } });
    }));
  }

  renderVals() {
    const S = React.createElement;
    const src = this.state.source;
    const gran = this.state.gran;

    const tabActive = { flex: 1, padding: "7px 0", borderRadius: "8px", border: "none", cursor: "pointer", fontFamily: "inherit", fontSize: "13px", fontWeight: 600, background: "linear-gradient(135deg, #2E6BF0, #35D6E8)", color: "#04121a" };
    const tabIdle = { flex: 1, padding: "7px 0", borderRadius: "8px", border: "none", cursor: "pointer", fontFamily: "inherit", fontSize: "13px", fontWeight: 600, background: "transparent", color: "#9AA3B2" };

    // granularity cards
    const gopts = [
      { key: "line", title: "Por línea", sub: "Recomendado · marca el inicio de cada verso" },
      { key: "word", title: "Por palabra / acorde", sub: "Avanzado · máxima precisión, toma más tiempo" },
    ];
    const granOptions = gopts.map(o => {
      const on = gran === o.key;
      return {
        title: o.title, sub: o.sub,
        select: () => this.setState({ gran: o.key }),
        cardStyle: { display: "flex", alignItems: "flex-start", gap: "11px", width: "100%", padding: "12px 13px", background: on ? "rgba(53,214,232,0.07)" : "#0F131B", border: "1px solid " + (on ? "rgba(53,214,232,0.4)" : "#1f2636"), borderRadius: "12px", cursor: "pointer", fontFamily: "inherit" },
        radioStyle: { display: "grid", placeItems: "center", width: "18px", height: "18px", flex: "0 0 auto", marginTop: "1px", borderRadius: "50%", border: "2px solid " + (on ? "#35D6E8" : "#3a4454") },
        radioDot: on ? S("span", { style: { width: "8px", height: "8px", borderRadius: "50%", background: "#35D6E8" } }) : null,
      };
    });

    // sheet lines
    const cur = this.state.current;
    const check = S("svg", { width: 15, height: 15, viewBox: "0 0 24 24", fill: "none", stroke: "#35D6E8", strokeWidth: 2.6, strokeLinecap: "round", strokeLinejoin: "round" }, S("path", { d: "M20 6 9 17l-5-5" }));

    const lines = this.LINES.map((l, i) => {
      const isSection = l.type === "section";
      const done = !!this.state.stamps[i] && !isSection;
      const isCur = i === cur;
      let rowStyle = { display: "flex", alignItems: "center", gap: "12px", padding: "11px 14px", borderRadius: "10px", margin: "2px 0", borderLeft: "3px solid transparent" };
      let textStyle = { fontSize: "16px", color: "#8b93a3" };
      if (isCur && !isSection) {
        rowStyle = { ...rowStyle, background: "rgba(53,214,232,0.08)", borderLeft: "3px solid #35D6E8" };
        textStyle = { fontSize: "17px", fontWeight: 700, color: "#F2F6FB" };
      } else if (done) {
        textStyle = { fontSize: "16px", color: "#5b6577" };
      } else if (!isSection && i > cur) {
        textStyle = { fontSize: "16px", color: "#9AA3B2" };
      }
      // status cell
      let statusEl = null;
      if (isSection) statusEl = null;
      else if (done) statusEl = S("span", { style: { display: "inline-flex", alignItems: "center", gap: "5px" } }, check, S("span", { style: { fontSize: "11.5px", fontVariantNumeric: "tabular-nums", color: "#35D6E8", fontWeight: 600 } }, this.state.stamps[i]));
      else if (isCur) statusEl = S("span", { style: { fontSize: "11px", fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "#35D6E8", padding: "3px 8px", border: "1px solid rgba(53,214,232,0.4)", borderRadius: "999px" } }, "Ahora");
      else statusEl = S("span", { style: { width: "9px", height: "9px", borderRadius: "50%", border: "1.5px solid #2a3346", marginLeft: "4px" } });

      return {
        isSection, isLyric: !isSection, text: l.text,
        rowStyle, textStyle, statusEl, done,
        remark: () => { const s = { ...this.state.stamps }; delete s[i]; this.setState({ stamps: s, current: i }); },
      };
    });

    const totalLines = this.lyricIndices().length;
    const markNum = this.lyricIndices().indexOf(cur) + 1;

    const playIcon = this.state.playing
      ? S("svg", { width: 18, height: 18, viewBox: "0 0 24 24", fill: "currentColor" }, S("path", { d: "M6 5h4v14H6zM14 5h4v14h-4z" }))
      : S("svg", { width: 18, height: 18, viewBox: "0 0 24 24", fill: "currentColor", style: { marginLeft: "2px" } }, S("path", { d: "M8 5v14l11-7z" }));

    return {
      // source
      isYt: src === "youtube", isFile: src === "file",
      setYt: () => this.setState({ source: "youtube" }), setFile: () => this.setState({ source: "file" }),
      ytTabStyle: src === "youtube" ? tabActive : tabIdle,
      fileTabStyle: src === "file" ? tabActive : tabIdle,
      thumbWave: this.thumbWaveEls(),
      // granularity
      granOptions,
      // sheet
      lines, markLine: () => this.markLine(),
      markNum: markNum > 0 ? markNum : 1, totalLines,
      // transport
      togglePlay: () => this.setState({ playing: !this.state.playing }),
      playIcon,
      elapsed: "1:12",
      progressWave: this.waveBars(64, this.state.progress, "dark"),
      seek: () => {},
      reset: () => this.setState({ stamps: {}, current: this.lyricIndices()[0], progress: 0 }),
    };
  }
}
</script>
</body>
</html>
