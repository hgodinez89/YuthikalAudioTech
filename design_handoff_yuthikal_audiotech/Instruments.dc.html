<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; background: #05070A; }
  *, *::before, *::after { box-sizing: border-box; }
  ::selection { background: rgba(53,214,232,0.28); }
</style>
</helmet>
<div style="font-family: 'Inter', system-ui, sans-serif; background: #05070A; color: #E7ECF3; min-height: 100vh; -webkit-font-smoothing: antialiased;">

  <!-- HEADER -->
  <header style="display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 16px 28px; border-bottom: 1px solid #12151C;">
    <img src="assets/yuthikal-logo-crop.png" alt="Yuthikal AudioTech" style="height: 40px; width: auto; display: block;">
    <nav style="display: flex; gap: 30px; font-size: 14px; font-weight: 500; color: #9AA3B2;">
      <span style="color: #E7ECF3;">Instrumentos</span>
      <span>Acordes</span>
      <span>Mis Playlists</span>
    </nav>
    <div style="display: flex; align-items: center; gap: 12px;">
      <div style="display: flex; padding: 3px; background: #0C0F15; border: 1px solid #1b2130; border-radius: 999px; font-size: 12px; font-weight: 600;">
        <span style="padding: 4px 11px; border-radius: 999px; background: linear-gradient(135deg, #2E6BF0, #35D6E8); color: #04121a;">ES</span>
        <span style="padding: 4px 11px; border-radius: 999px; color: #9AA3B2;">EN</span>
      </div>
      <button aria-label="Cambiar tema" style="display: grid; place-items: center; width: 38px; height: 38px; background: #0C0F15; border: 1px solid #1b2130; border-radius: 10px; color: #9AA3B2; cursor: pointer;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"></path></svg>
      </button>
    </div>
  </header>

  <div style="max-width: 1000px; margin: 0 auto; padding: 72px 28px 90px;">
    <!-- TITLE -->
    <div style="text-align: center; margin-bottom: 56px;">
      <div style="font-size: 12px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: #35D6E8; margin-bottom: 14px;">Comienza aquí</div>
      <h1 style="margin: 0 0 14px; font-size: 42px; font-weight: 800; letter-spacing: -0.025em;">Elige tu instrumento</h1>
      <p style="margin: 0 auto; max-width: 480px; font-size: 17px; line-height: 1.6; color: #9AA3B2;">Empieza con la guitarra. Pronto sumaremos más instrumentos a tu atril digital.</p>
    </div>

    <!-- GRID -->
    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 22px;">

      <!-- GUITARRA (active) -->
      <a href="Chord Finder.dc.html" style="text-decoration: none; color: inherit; position: relative; display: flex; flex-direction: column; align-items: center; text-align: center; padding: 44px 32px 34px; background: linear-gradient(180deg, #12151C, #0e1118); border: 1px solid #2a3346; border-radius: 22px; cursor: pointer; transition: border-color .18s, transform .18s, box-shadow .18s;" style-hover="border-color: #35D6E8; transform: translateY(-4px); box-shadow: 0 20px 50px rgba(46,107,240,0.22);">
        <div style="position: absolute; top: 18px; right: 18px; display: grid; place-items: center; width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, #2E6BF0, #35D6E8); color: #04121a;">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>
        </div>
        <div style="color: #35D6E8; margin-bottom: 22px;">
          <svg width="96" height="96" viewBox="0 0 96 96" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M74 14l-8 8"></path>
            <path d="M78 10a4 4 0 0 1 4 4l-4 4a4 4 0 0 1-4-4z"></path>
            <path d="M66 22 41 47"></path>
            <path d="M41 47c-4-4-11-3-16 2s-8 15-2 21 16 3 21-2 6-13 2-16z"></path>
            <circle cx="35" cy="58" r="7"></circle>
          </svg>
        </div>
        <h2 style="margin: 0 0 6px; font-size: 22px; font-weight: 700;">Guitarra</h2>
        <p style="margin: 0; font-size: 14px; color: #8b93a3;">Acordes, cuerdas, notas y tus canciones.</p>
        <span style="margin-top: 18px; display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600; color: #35D6E8;">
          Explorar
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"></path></svg>
        </span>
      </a>

      <!-- disabled cards -->
      <sc-for list="{{ soon }}" as="ins" hint-placeholder-count="3">
        <div style="position: relative; display: flex; flex-direction: column; align-items: center; text-align: center; padding: 44px 32px 34px; background: #0c0e13; border: 1px solid #171c28; border-radius: 22px; cursor: not-allowed;">
          <span style="position: absolute; top: 18px; right: 18px; font-size: 10.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #35D6E8; padding: 5px 11px; border: 1px solid rgba(53,214,232,0.35); border-radius: 999px;">Próximamente</span>
          <div style="color: #3b4454; margin-bottom: 22px;">{{ ins.icon }}</div>
          <h2 style="margin: 0 0 6px; font-size: 22px; font-weight: 700; color: #5b6577;">{{ ins.name }}</h2>
          <p style="margin: 0; font-size: 14px; color: #454e5e;">{{ ins.desc }}</p>
        </div>
      </sc-for>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1000, &quot;height&quot;: 900}}">
class Component extends DCLogic {
  renderVals() {
    const S = React.createElement;
    const base = { width: 96, height: 96, viewBox: "0 0 96 96", fill: "none", stroke: "currentColor", strokeWidth: 2.4, strokeLinecap: "round", strokeLinejoin: "round" };

    const piano = S("svg", base,
      S("rect", { x: 18, y: 26, width: 60, height: 44, rx: 4 }),
      S("path", { d: "M32 26v28M46 26v28M60 26v28" }),
      S("path", { d: "M27 54v16M41 54v16M53 54v16M67 54v16" })
    );
    const ukelele = S("svg", base,
      S("path", { d: "M70 20l-6 6" }),
      S("path", { d: "M64 26 46 44" }),
      S("path", { d: "M46 44c-3-3-9-2-13 2s-6 12-2 16 13 2 17-2 4-11 1-14z" }),
      S("circle", { cx: 40, cy: 54, r: 5.5 })
    );
    const bajo = S("svg", base,
      S("path", { d: "M76 12l-4 4M80 8l-8 8" }),
      S("path", { d: "M74 16 40 50" }),
      S("path", { d: "M40 50c-4-4-11-3-15 1s-5 12 0 17 13 4 17 0 3-14-2-18z" }),
      S("path", { d: "M74 16l2 2M70 20l2 2M66 24l2 2" })
    );

    const soon = [
      { name: "Piano", desc: "Teclas, escalas y acordes.", icon: piano },
      { name: "Ukelele", desc: "Acordes y canciones.", icon: ukelele },
      { name: "Bajo", desc: "Notas y líneas de bajo.", icon: bajo },
    ];
    return { soon };
  }
}
</script>
</body>
</html>
