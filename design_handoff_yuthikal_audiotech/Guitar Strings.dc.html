<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; background: #05070A; }
  *, *::before, *::after { box-sizing: border-box; }
  ::selection { background: rgba(53,214,232,0.28); }
</style>
</helmet>
<div style="font-family: 'Inter', system-ui, sans-serif; background: #05070A; color: #E7ECF3; min-height: 100vh; -webkit-font-smoothing: antialiased;">

  <!-- HEADER -->
  <header style="display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 16px 28px; border-bottom: 1px solid #12151C;">
    <div style="display: flex; align-items: center; gap: 16px; min-width: 0;">
      <img src="assets/yuthikal-logo-crop.png" alt="Yuthikal AudioTech" style="height: 38px; width: auto; display: block;">
      <span style="display: flex; align-items: center; gap: 8px; font-size: 13px; color: #7d8798; white-space: nowrap;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
        Guitarra
      </span>
    </div>
    <div style="display: flex; align-items: center; gap: 12px;">
      <div style="display: flex; padding: 3px; background: #0C0F15; border: 1px solid #1b2130; border-radius: 999px; font-size: 12px; font-weight: 600;">
        <span style="padding: 4px 11px; border-radius: 999px; background: linear-gradient(135deg, #2E6BF0, #35D6E8); color: #04121a;">ES</span>
        <span style="padding: 4px 11px; border-radius: 999px; color: #9AA3B2;">EN</span>
      </div>
      <button aria-label="Cambiar tema" style="display: grid; place-items: center; width: 38px; height: 38px; background: #0C0F15; border: 1px solid #1b2130; border-radius: 10px; color: #9AA3B2; cursor: pointer;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"></path></svg>
      </button>
    </div>
  </header>

  <div style="max-width: 960px; margin: 0 auto; padding: 56px 28px 90px;">
    <!-- TITLE -->
    <div style="margin-bottom: 34px;">
      <div style="font-size: 12px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: #35D6E8; margin-bottom: 10px;">Referencia · Guitarra</div>
      <h1 style="margin: 0 0 12px; font-size: 36px; font-weight: 800; letter-spacing: -0.025em;">Las cuerdas de la guitarra</h1>
      <p style="margin: 0; max-width: 620px; font-size: 16px; line-height: 1.6; color: #9AA3B2;">De la más aguda y delgada (1ª) a la más grave y gruesa (6ª). En afinación estándar, sus notas son Mi–Si–Sol–Re–La–Mi.</p>
    </div>

    <!-- NECK ILLUSTRATION -->
    <div style="background: linear-gradient(180deg, #101017, #0b0d12); border: 1px solid #1b2130; border-radius: 20px; padding: 26px 24px; margin-bottom: 40px;">{{ neck }}</div>

    <!-- STRING ROWS -->
    <div style="display: flex; flex-direction: column; gap: 12px;">
      <sc-for list="{{ strings }}" as="s" hint-placeholder-count="6">
        <article style="display: grid; grid-template-columns: 66px 1fr auto; gap: 22px; align-items: center; padding: 18px 22px; background: #12151C; border: 1px solid #1b2130; border-radius: 16px; transition: border-color .15s;" style-hover="border-color: #2a3346;">
          <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; width: 66px; height: 66px; border-radius: 14px; background: rgba(53,214,232,0.08); border: 1px solid rgba(53,214,232,0.22);">
            <span style="font-size: 24px; font-weight: 800; color: #35D6E8; line-height: 1;">{{ s.num }}</span>
            <span style="font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: #5b8; color: #6aa9b5; margin-top: 3px;">cuerda</span>
          </div>
          <div>
            <div style="display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;">
              <span style="font-size: 22px; font-weight: 800;">{{ s.noteEs }}</span>
              <span style="font-size: 16px; font-weight: 600; color: #7d8798;">— {{ s.noteEn }}</span>
              <span style="padding: 3px 10px; background: #0F131B; border: 1px solid #2a3346; border-radius: 999px; font-size: 12px; font-weight: 600; color: #C3CAD6;">{{ s.trad }}</span>
            </div>
            <div style="font-size: 13px; color: #7d8798; margin-top: 5px;">{{ s.pitch }}</div>
          </div>
          <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 8px; min-width: 120px;">
            <span style="font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: #5b6577;">Grosor</span>
            {{ s.gauge }}
          </div>
        </article>
      </sc-for>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 960, &quot;height&quot;: 900}}">
class Component extends DCLogic {
  DATA = [
    { num: "1ª", noteEs: "Mi", noteEn: "E", trad: "Prima",   pitch: "La más aguda y delgada", th: 1 },
    { num: "2ª", noteEs: "Si", noteEn: "B", trad: "Segunda", pitch: "Aguda", th: 2 },
    { num: "3ª", noteEs: "Sol", noteEn: "G", trad: "Tercera", pitch: "Media", th: 3 },
    { num: "4ª", noteEs: "Re", noteEn: "D", trad: "Cuarta",  pitch: "Grave (entorchada)", th: 4 },
    { num: "5ª", noteEs: "La", noteEn: "A", trad: "Quinta",  pitch: "Grave (entorchada)", th: 5 },
    { num: "6ª", noteEs: "Mi", noteEn: "E", trad: "Bordona", pitch: "La más grave y gruesa", th: 6 },
  ];

  neckSvg() {
    const S = React.createElement;
    const W = 908, H = 210;
    const x0 = 118, xEnd = 800;
    const ys = [34, 62, 90, 118, 146, 174];
    const els = [];
    // fretboard
    els.push(S("rect", { key: "fb", x: x0, y: 16, width: xEnd - x0, height: H - 32, rx: 6, fill: "#171a22", stroke: "#242b3a", strokeWidth: 1.4 }));
    // headstock
    els.push(S("path", { key: "hs", d: `M${x0} 20 L40 32 Q20 40 20 105 Q20 170 40 178 L${x0} 190 Z`, fill: "#12141b", stroke: "#242b3a", strokeWidth: 1.4 }));
    // nut
    els.push(S("rect", { key: "nut", x: x0 - 4, y: 16, width: 6, height: H - 32, rx: 2, fill: "#5a6474" }));
    // frets
    [0.2, 0.4, 0.6, 0.8].forEach((f, i) => {
      const x = x0 + (xEnd - x0) * f;
      els.push(S("line", { key: "fr" + i, x1: x, y1: 22, x2: x, y2: H - 22, stroke: "#2a3242", strokeWidth: 2 }));
      els.push(S("circle", { key: "fd" + i, cx: x, cy: H / 2 + 4, r: 3, fill: "#2a3242" }));
    });
    // tuning pegs (3 top-left / 3 bottom) + strings + labels
    this.DATA.forEach((s, i) => {
      const y = ys[i];
      const sw = 1 + i * 0.8;
      // string line
      els.push(S("line", { key: "s" + i, x1: x0, y1: y, x2: xEnd, y2: y, stroke: "#aeb6c4", strokeWidth: sw, strokeLinecap: "round", opacity: 0.9 }));
      // peg
      const pegX = 34, pegY = y;
      els.push(S("line", { key: "pl" + i, x1: x0, y1: y, x2: pegX + 6, y2: pegY, stroke: "#4a5568", strokeWidth: sw }));
      els.push(S("circle", { key: "pg" + i, cx: pegX, cy: pegY, r: 5, fill: "#0d0f14", stroke: "#5a6474", strokeWidth: 1.6 }));
      // note label (Spanish + English)
      els.push(S("text", { key: "t" + i, x: xEnd + 14, y: y + 5, fontSize: 16, fontFamily: "Inter, sans-serif" },
        S("tspan", { fill: "#35D6E8", fontWeight: 800 }, s.noteEs),
        S("tspan", { fill: "#4f5a6d", fontWeight: 600 }, "  ·  "),
        S("tspan", { fill: "#8b93a3", fontWeight: 600, fontSize: 13 }, s.noteEn)
      ));
      els.push(S("text", { key: "n" + i, x: x0 + 8, y: y - 6, fill: "#5b6577", fontSize: 10, fontWeight: 700, fontFamily: "Inter, sans-serif" }, s.num));
    });
    return S("svg", { viewBox: `0 0 ${W} ${H}`, width: "100%", style: { display: "block", maxWidth: W + "px", margin: "0 auto" } }, els);
  }

  gaugeEl(th) {
    const S = React.createElement;
    // horizontal bar with stroke width representing thickness
    return S("svg", { width: 120, height: 16, viewBox: "0 0 120 16" },
      S("line", { x1: 4, y1: 8, x2: 116, y2: 8, stroke: "#35D6E8", strokeWidth: 0.6 + th * 1.5, strokeLinecap: "round" })
    );
  }

  renderVals() {
    return {
      neck: this.neckSvg(),
      strings: this.DATA.map(s => ({ ...s, gauge: this.gaugeEl(s.th) })),
    };
  }
}
</script>
</body>
</html>
